<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <!-- Meta viewport for mobile responsiveness -->
  <meta name="viewport" content="width=device-width, initial-scale=1, target-densityDpi=device-dpi">
  <title>Expense Tracker with Settings, Totals & Responsive Layout</title>
  <style>
    /* Base styles */
    body {
      font-family: Arial, sans-serif;
      margin: 20px;
      text-align: center;
    }
    h1, h2 {
      margin-bottom: 10px;
    }
    section {
      margin-bottom: 20px;
      border: 1px solid #ddd;
      padding: 10px;
    }
    input, textarea, button, select {
      padding: 8px;
      margin: 5px;
      box-sizing: border-box;
    }
    input, textarea, select {
      width: 200px;
    }
    table {
      width: 90%;
      max-width: 100%;
      margin: 0 auto 20px auto;
      border-collapse: collapse;
    }
    th, td {
      padding: 8px;
      border: 1px solid #ddd;
      word-wrap: break-word;
    }
    th {
      background-color: #f2f2f2;
    }
    .button {
      padding: 8px 12px;
      margin: 5px;
      cursor: pointer;
      border: none;
      background: #25934d;
      color: white;
    }
    .edit-btn {
      background-color: #FFA500;
    }
    #receiptGallery img {
      width: 100px;
      margin: 5px;
      border: 1px solid #ccc;
    }
    .total-row {
      font-weight: bold;
      background-color: #eee;
    }
    /* Display the saved company logo on the interface; constrain to 30mm x 30mm max */
    #displayLogo {
      margin-top: 10px;
      max-width: 30mm;
      max-height: 30mm;
    }

    /* Responsive adjustments using media queries */
    @media (max-width: 600px) {
      body {
        margin: 10px;
        font-size: 14px;
      }
      section, form, table {
        width: 95%;
      }
      input, textarea, button, select {
        width: 90%;
        max-width: 300px;
      }
      #receiptGallery img {
        width: 80px;
      }
    }
  </style>
</head>
<body>
  <!-- Report Information Section -->
  <section id="reportInfo">
    <h2>Expense Report</h2>
    <input type="file" id="logoInput" accept=".jpg" />
    <br />
	    <!-- Display saved company logo on the web interface -->
    <img id="displayLogo" src="" alt="Company Logo" />
    <br />
    <input type="text" id="employeeName" placeholder="Your Name (Employee)" />
    <input type="text" id="companyName" placeholder="Company Name (Employer)" />
    <input type="text" id="reportPeriod" placeholder="Report Period (e.g., March 2025)" />
    <br />
    <button id="clearAll" class="button" style="background-color: darkred;">Clear All</button>
    <button id="saveSettings" class="button">Save Settings</button>
    <button id="exportData" class="button">Export Expenses</button>
    <button id="importData" class="button">Import Expenses</button>
	  <!-- Export PDF Button -->
  <button id="exportPDF" class="button">Export to PDF</button>
    <!-- Hidden file input for importing data -->
	<button id="sortByDate" class="button" style="background-color: #4a6fa5;">Sort by Date</button>
    <input type="file" id="importDataInput" accept=".exr" style="display:none" />
    <br />
  </section>

  <h1>Expense Tracker</h1>

  <!-- Expense Submission Form -->
  <form id="expenseForm">
    <input type="date" name="date" required placeholder="Date" />
    <input type="number" step="0.01" name="amount" required placeholder="Amount" />
    <select name="currency" id="currencySelect" required>
      <option value="EUR" selected>EUR</option>
      <option value="USD">USD</option>
      <option value="GBP">GBP</option>
      <option value="JPY">JPY</option>
      <option value="CHF">CHF</option>
    </select>
    <!-- Manual exchange rate input if not EUR -->
    <input type="number" step="0.01" name="amountEUR" id="amountEURField" placeholder="Amount in EUR" style="display: none;" />
    <input type="text" name="vendor" required placeholder="Vendor" />
    <input type="text" name="description" placeholder="Description" />
    <!-- Receipt Image File Input -->
    <input type="file" name="receiptImageFile" accept=".jpg" />
    <button type="submit" class="button">Add Expense</button>
  </form>

  <!-- Expense List Table -->
  <table id="expenseTable">
    <thead>
      <tr>
        <th>Item#</th>
        <th>Date</th>
        <th>Amount (EUR)</th>
        <th>Vendor</th>
        <th>Description</th>
        <th>Actions</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>

  <!-- Receipt Gallery -->
  <h2>Receipt Gallery</h2>
  <div id="receiptGallery"></div>



  <!-- Include jsPDF and autoTable Plugin -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>

  <script>

    // Global variables and state
    const LOCAL_STORAGE_KEY = "expenses2";
    const SETTINGS_KEY = "reportSettings";
    let expenses = JSON.parse(localStorage.getItem(LOCAL_STORAGE_KEY)) || [];
    let editIndex = null;
    let reportLogo = ""; // base64 logo data

    // DOM Elements
    const expenseForm = document.getElementById("expenseForm");
    const expenseTableBody = document.getElementById("expenseTable").querySelector("tbody");
    const receiptGalleryDiv = document.getElementById("receiptGallery");
    const currencySelect = document.getElementById("currencySelect");
    const amountEURField = document.getElementById("amountEURField");

    const logoInput = document.getElementById("logoInput");
    const saveSettingsButton = document.getElementById("saveSettings");
    const exportDataButton = document.getElementById("exportData");
    const importDataButton = document.getElementById("importData");
    const importDataInput = document.getElementById("importDataInput");
    const clearAllButton = document.getElementById("clearAll");
    const displayLogo = document.getElementById("displayLogo");

    // Process company logo selection: update base64 data and show logo on interface.
    logoInput.addEventListener("change", function() {
      const file = this.files[0];
      if (file) {
        const reader = new FileReader();
        reader.onload = function(e) {
          reportLogo = e.target.result;
          displayLogo.src = reportLogo;
        };
        reader.readAsDataURL(file);
      }
    });

    // Toggle exchange rate field based on currency.
    // Toggle EUR amount field based on currency.
currencySelect.addEventListener("change", function() {
  const amountEURField = document.getElementById("amountEURField");
  if (currencySelect.value !== "EUR") {
    amountEURField.style.display = "inline-block";
  } else {
    amountEURField.style.display = "none";
    amountEURField.value = "";
  }
});
// Add event listener for the sort button
document.getElementById("sortByDate").addEventListener("click", sortExpensesByDate);


    // Save settings (employee name, company name, report period, logo) to localStorage.
    saveSettingsButton.addEventListener("click", function() {
      const settings = {
        employeeName: document.getElementById("employeeName").value,
        companyName: document.getElementById("companyName").value,
        reportPeriod: document.getElementById("reportPeriod").value,
        logo: reportLogo
      };
      localStorage.setItem(SETTINGS_KEY, JSON.stringify(settings));
      alert("Settings saved!");
      displayLogo.src = reportLogo;
    });

    // Export data (expenses and settings) as a JSON text file.
    exportDataButton.addEventListener("click", function() {
      const settings = {
        employeeName: document.getElementById("employeeName").value,
        companyName: document.getElementById("companyName").value,
        reportPeriod: document.getElementById("reportPeriod").value,
        logo: reportLogo
      };
      const exportObj = { expenses, settings };
      const dataStr = JSON.stringify(exportObj, null, 2);
      const blob = new Blob([dataStr], { type: "text/plain;charset=utf-8" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = settings.reportPeriod+".exr";
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
    });

    // Import data from JSON file.
    importDataButton.addEventListener("click", function() {
      importDataInput.click();
    });

    importDataInput.addEventListener("change", function() {
  const file = this.files[0];
  if (file) {
    const reader = new FileReader();
    reader.onload = function(e) {
      try {
        const importedData = JSON.parse(e.target.result);
        if (importedData.expenses) {
          // Process the imported expenses to handle the image data properly
          importedData.expenses.forEach(expense => {
            // Handle receipt images
            if (expense.receiptImage && expense.receiptImage.trim() !== "") {
              // Preserve the original receipt image data
              expense.receiptImagePath = expense.receiptImage;
              
              // If the image is base64 data, no additional processing needed
              // If it's a blob URL, it won't work after import, so mark for regeneration
              if (expense.receiptImage.startsWith("blob:")) {
                console.log("Blob URL detected, image may need regeneration");
              }
            }
          });
          
          expenses = importedData.expenses;
          localStorage.setItem(LOCAL_STORAGE_KEY, JSON.stringify(expenses));
        }
        if (importedData.settings) {
          localStorage.setItem(SETTINGS_KEY, JSON.stringify(importedData.settings));
          document.getElementById("employeeName").value = importedData.settings.employeeName || "";
          document.getElementById("companyName").value = importedData.settings.companyName || "";
          document.getElementById("reportPeriod").value = importedData.settings.reportPeriod || "";
          if (importedData.settings.logo) {
            reportLogo = importedData.settings.logo;
            displayLogo.src = reportLogo;
          }
        }
        processReceiptImages(); // Add this function call to process images
        loadExpenses();
        alert("Data imported successfully!");
      } catch (err) {
        alert("Error importing data: " + err);
      }
    };
    reader.readAsText(file);
  }
});




    // Clear All button: remove all saved expenses and settings.
    clearAllButton.addEventListener("click", function() {
      if (confirm("This will clear all saved expenses and settings. Continue?")) {
        localStorage.removeItem(LOCAL_STORAGE_KEY);
        localStorage.removeItem(SETTINGS_KEY);
        expenses = [];
        editIndex = null;
        reportLogo = "";
        expenseForm.reset();
        displayLogo.src = "";
        loadExpenses();
        alert("All data cleared.");
      }
    });

    // Load saved expenses and settings on page load.
    document.addEventListener("DOMContentLoaded", function() {
      loadExpenses();
      const settingsStr = localStorage.getItem(SETTINGS_KEY);
      if (settingsStr) {
        const settings = JSON.parse(settingsStr);
        document.getElementById("employeeName").value = settings.employeeName || "";
        document.getElementById("companyName").value = settings.companyName || "";
        document.getElementById("reportPeriod").value = settings.reportPeriod || "";
        if (settings.logo) {
          reportLogo = settings.logo;
          displayLogo.src = reportLogo;
        }
      }
    });

    // Expense form submission.
// Expense form submission.
expenseForm.addEventListener("submit", function(e) {
  e.preventDefault();
  const formData = new FormData(expenseForm);
    const expense = {
    date: formData.get("date"),
    amount: parseFloat(formData.get("amount")).toFixed(2),
    currency: formData.get("currency"),
    vendor: formData.get("vendor"),
    description: formData.get("description"),
    receiptImagePath: null,
    receiptFileName: null,
    exchangeRate: null,
    convertedAmountEUR: null
  };


  if (expense.currency !== "EUR") {
    const amountEURValue = formData.get("amountEUR");
    if (!amountEURValue || parseFloat(amountEURValue) <= 0) {
      alert("Please input a valid amount in EUR.");
      return;
    }
    expense.convertedAmountEUR = parseFloat(amountEURValue).toFixed(2);
    // Calculate the exchange rate for reference
    expense.exchangeRate = (expense.convertedAmountEUR / expense.amount).toFixed(4);
  } else {
    expense.convertedAmountEUR = expense.amount;
    expense.exchangeRate = 1;
  }


  const fileInput = expenseForm.elements["receiptImageFile"];
  const file = fileInput.files[0];
  
  function processExpense() {
    if (editIndex !== null) {
      expenses[editIndex] = expense;
      editIndex = null;
    } else {
      expenses.push(expense);
    }
    saveExpenses();
  }
  
if (file) {
  const reader = new FileReader();
  reader.onload = function(e) {
    // Store the image as a base64 string instead of a blob URL
    expense.receiptImage = e.target.result;
    expense.receiptFileName = file.name;
    processExpense();
  };
  reader.readAsDataURL(file);
} else {
  if (editIndex !== null && expenses[editIndex].receiptImagePath) {
    expense.receiptImage = expenses[editIndex].receiptImagePath;
    expense.receiptFileName = expenses[editIndex].receiptFileName;
  } else if (editIndex !== null && expenses[editIndex].receiptImage) {
    // For backward compatibility
    expense.receiptImage = expenses[editIndex].receiptImage;
  }
  processExpense();
}


});

    // Save expenses to localStorage and update UI.
    function saveExpenses() {
      localStorage.setItem(LOCAL_STORAGE_KEY, JSON.stringify(expenses));
      updateExpenseTable();
      updateReceiptGallery();
      expenseForm.reset();
      amountEURField.style.display = "none";

    }

// Load expenses from localStorage.
function loadExpenses() {
  expenses = JSON.parse(localStorage.getItem(LOCAL_STORAGE_KEY)) || [];
  processReceiptImages(); // Add this line to process images on load
  migrateOldReceiptFormat();
  updateExpenseTable();
  updateReceiptGallery();
}


function processReceiptImages() {
  let hasProcessedImages = false;
  
  expenses.forEach(expense => {
    // Skip if no image data
    if (!expense.receiptImage && !expense.receiptImagePath) return;
    
    const imageSrc = expense.receiptImagePath || expense.receiptImage;
    
    // Skip empty sources
    if (!imageSrc || imageSrc.trim() === "") return;
    
    // If it's a blob URL that won't work after reload/import
    if (imageSrc.startsWith("blob:")) {
      console.log("Found blob URL that needs processing:", imageSrc);
      // We can't recover the original data, but we can mark it
      expense.receiptImageNeedsRegeneration = true;
      hasProcessedImages = true;
    }
    
    // Make sure both properties are set for backward compatibility
    if (expense.receiptImage && !expense.receiptImagePath) {
      expense.receiptImagePath = expense.receiptImage;
      hasProcessedImages = true;
    }
    
    if (expense.receiptImagePath && !expense.receiptImage) {
      expense.receiptImage = expense.receiptImagePath;
      hasProcessedImages = true;
    }
  });
  
  // If we processed any images, save the changes
  if (hasProcessedImages) {
    localStorage.setItem(LOCAL_STORAGE_KEY, JSON.stringify(expenses));
  }
}



	
	// Add this function after the loadExpenses function
function migrateOldReceiptFormat() {
  let needsMigration = false;
  
  expenses.forEach(expense => {
    if (expense.receiptImage && !expense.receiptImagePath) {
      // This expense has the old format
      expense.receiptImagePath = expense.receiptImage;
      needsMigration = true;
    }
  });
  
  if (needsMigration) {
    saveExpenses();
    console.log("Migrated old receipt format to new format");
  }
}


    // Update expense table (including header line and total row).
    function updateExpenseTable() {
      expenseTableBody.innerHTML = "";
      let totalSum = 0;
      expenses.forEach((expense, index) => {
        const row = expenseTableBody.insertRow();
        row.id = "expense-" + index;

        // Item# column.
        const itemCell = row.insertCell(0);
        itemCell.textContent = index + 1;

        // Date column.
        row.insertCell(1).textContent = expense.date;

        // Amount column.
        const amountCell = row.insertCell(2);
        if (expense.currency !== "EUR") {
          amountCell.innerHTML = `<div>${expense.convertedAmountEUR} EUR</div>
                                  <div style="font-size:8px;color:#555;">(${expense.amount} ${expense.currency})</div>`;
        } else {
          amountCell.textContent = expense.convertedAmountEUR + " EUR";
        }
        totalSum += parseFloat(expense.convertedAmountEUR);

        // Other columns.
        row.insertCell(3).textContent = expense.vendor;
        row.insertCell(4).textContent = expense.description || "N/A";

        // Actions: Edit and Delete.
        const actionsCell = row.insertCell(5);
        const editButton = document.createElement("button");
        editButton.textContent = "Edit";
        editButton.className = "button edit-btn";
        editButton.addEventListener("click", () => editExpense(index));
        actionsCell.appendChild(editButton);
        const deleteButton = document.createElement("button");
        deleteButton.textContent = "Delete";
        deleteButton.className = "button";
        deleteButton.style.backgroundColor = "darkred";
        deleteButton.style.marginLeft = "5px";
        deleteButton.addEventListener("click", () => deleteExpense(index));
        actionsCell.appendChild(deleteButton);
      });
      
      // Add total row.
      const totalRow = expenseTableBody.insertRow();
      totalRow.className = "total-row";
      const cellTotalLabel = totalRow.insertCell(0);
      cellTotalLabel.colSpan = 2;
      cellTotalLabel.textContent = "Total";
      const cellTotalValue = totalRow.insertCell(1);
      cellTotalValue.textContent = totalSum.toFixed(2) + " EUR";
      cellTotalValue.style.fontWeight = "bold";
      // Fill extra cells to reach 7 columns.
      for (let i = 0; i < 3; i++) {
        const emptyCell = totalRow.insertCell(-1);
        emptyCell.textContent = "";
      }
    }

    // Populate form fields for editing.
function editExpense(index) {
  const expense = expenses[index];
  expenseForm.date.value = expense.date;
  expenseForm.amount.value = expense.amount;
  expenseForm.currency.value = expense.currency;
  expenseForm.vendor.value = expense.vendor;
  expenseForm.description.value = expense.description;
  
  const amountEURField = document.getElementById("amountEURField");
  if (expense.currency !== "EUR") {
    amountEURField.style.display = "inline-block";
    amountEURField.value = expense.convertedAmountEUR;
  } else {
    amountEURField.style.display = "none";
    amountEURField.value = "";
  }
  editIndex = index;
}


    // Delete an expense with confirmation.
    function deleteExpense(index) {
      if (confirm("Are you sure you want to delete this expense?")) {
        expenses.splice(index, 1);
        saveExpenses();
      }
    }

    // Update receipt gallery with clickable thumbnails.
function updateReceiptGallery() {
  receiptGalleryDiv.innerHTML = "";
  expenses.forEach((expense, index) => {
    // Check for both property names to handle old and new formats
    const imageSrc = expense.receiptImagePath || expense.receiptImage;
    
    if (imageSrc && imageSrc.trim() !== "") {
      const link = document.createElement("a");
      link.href = "#expense-" + index;
      link.title = "Expense " + (index + 1) + ": " + expense.vendor;
      const img = document.createElement("img");
      
      // Add error handling for image loading failures
      img.onerror = function() {
        this.onerror = null;
        this.src = ""; // Clear the broken image
        this.alt = "Image could not be loaded";
        console.log("Failed to load image for expense: " + expense.vendor);
      };
      
      img.src = imageSrc;
      img.alt = "Receipt Image for " + expense.vendor;
      link.appendChild(img);
      receiptGalleryDiv.appendChild(link);
    }
  });
}







    // Helper: Get natural dimensions of an image.
    function getImageDimensions(src) {
      return new Promise((resolve) => {
        const img = new Image();
        img.onload = function() {
          resolve({ width: img.naturalWidth, height: img.naturalHeight });
        };
        img.src = src;
      });
    }

    // Export PDF with header, signature boxes, expense table (with totals), and receipt pages.
    document.getElementById("exportPDF").addEventListener("click", async function () {
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF({ unit: "mm", format: "a4" });
  const pageWidth = doc.internal.pageSize.getWidth();
  const pageHeight = doc.internal.pageSize.getHeight();
  const todayString = new Date().toLocaleDateString();

  // --- Add Small Header on First Page (this header text will later be added on every page) ---
  // Draw the small header at the very top (e.g., at y = 5)
  doc.setFontSize(10);
  doc.text("Nota Spese – " + todayString, pageWidth / 2, 5, { align: "center" });
  // Horizontal line above the main title
  doc.line(10, 7, pageWidth - 10, 7);

  // --- Main Title Section with Logo ---
  let mainTitleY = 20; // Y-coordinate for main title text
  // Add company logo (scaled proportionally to a maximum of 25x25 mm)
  if (reportLogo) {
    const maxLogoW = 25, maxLogoH = 25;
    const dims = await getImageDimensions(reportLogo);
    const logoScale = Math.min(maxLogoW / dims.width, maxLogoH / dims.height);
    const logoW = dims.width * logoScale;
    const logoH = dims.height * logoScale;
    // Place logo at the left (at x = 10) and vertically centered with the title.
    const logoX = 10;
    const logoY = mainTitleY - (logoH * 0.5);
    doc.addImage(
      reportLogo,
      reportLogo.startsWith("data:image/png") ? "PNG" : "JPEG",
      logoX,
      logoY,
      logoW,
      logoH
    );
   // Set mainTitleY so it's below the logo by at least 0 mm.
  mainTitleY = logoY + logoH + 0;
} else {
  // If no logo, choose a default mainTitleY.
  mainTitleY = 20;
}
  // Add main title text – centered.
  doc.setFontSize(20);
  doc.text(document.getElementById("reportPeriod").value, pageWidth / 2, mainTitleY-5, { align: "center" });
  // Horizontal line below the title
  doc.line(10, mainTitleY + 5, pageWidth - 10, mainTitleY + 5);

  // --- Signature Boxes (placed below title) ---
  const sigBoxY = mainTitleY + 10;
  const boxWidth = 80, boxHeight = 30;
  doc.setFontSize(10);
  // Employee signature box on the left
  doc.rect(10, sigBoxY, boxWidth, boxHeight);
  doc.text("Dipendente: " + (document.getElementById("employeeName").value || "Employee"), 12, sigBoxY + 5);
  doc.text("Data:  ___________________", 12, sigBoxY + 12);
  doc.text("Firma: ___________________", 12, sigBoxY + 19);
  // Employer signature box on the right
  doc.rect(pageWidth - boxWidth - 10, sigBoxY, boxWidth, boxHeight);
  doc.text("Società: " + (document.getElementById("companyName").value || "Employer"), pageWidth - boxWidth - 8, sigBoxY + 5);
  doc.text("Data:  ___________________", pageWidth - boxWidth - 8, sigBoxY + 12);
  doc.text("Firma: ___________________", pageWidth - boxWidth - 8, sigBoxY + 19);

  // --- Expense Table Section ---
  const tableStartY = sigBoxY + boxHeight + 10;
  const tableData = expenses.map((exp, index) => {
    let amountText =
      exp.currency !== "EUR"
        ? exp.convertedAmountEUR + " EUR\n(" + exp.amount + " " + exp.currency + ")"
        : exp.convertedAmountEUR + " EUR";
    return [
      index + 1,
      exp.date,
      exp.vendor,
      exp.description || "N/A",
      amountText,
    ];
  });
  const tableHeaders = ["Voce#", "Data", "Fornitore", "Descrizione", "Ammontare"];

  let totalSum = 0;
  expenses.forEach(exp => {
    totalSum += parseFloat(exp.convertedAmountEUR);
  });
  const footData = [["", "", "", "Totale", totalSum.toFixed(2) + " EUR"]];

  doc.autoTable({
    head: [tableHeaders],
    body: tableData,
    foot: footData,
    startY: tableStartY,
    styles: { fontSize: 10 },
    headStyles: {
    textColor: [0, 0, 0], // header text
	fillColor: [220, 220, 220]
	},
	footStyles: {
    fillColor: [220, 220, 220],
    textColor: [0, 0, 0],
    fontStyle: 'bold'
    },
    cellWidth: "wrap",
    columnStyles: { 2: { cellWidth: 40 } }
  });

  // --- Add Receipt Images on a New Blank Page ---
  doc.addPage();
  let currentY = 20;
  const bottomMargin = 20; // bottom margin for content
  const maxHeightPerPage = pageHeight - bottomMargin;
  const imageSpacing = 10;

  for (let [index, exp] of expenses.entries()) {
  // Support both old and new image formats
  const imageSrc = exp.receiptImagePath || exp.receiptImage;
  
  if (imageSrc && imageSrc.trim() !== "") {
    const { width: natW, height: natH } = await getImageDimensions(imageSrc);
    // Set max dimensions for each receipt image (you can adjust these as needed)
    const maxW = 150, maxH = 150;
    let scale = Math.min(maxW / natW, maxH / natH);
    const imgW = natW * scale;
    const imgH = natH * scale;
    // Check for overflow on current page
    if (currentY + imgH + imageSpacing > maxHeightPerPage) {
      doc.addPage();
      currentY = 20;
    }
    // Add a label above the image
    doc.setFontSize(10);
    doc.text(`Ricevuta per spesa #${index + 1} - Fornitore: ${exp.vendor}`, 10, currentY - 3);
    // Center the image horizontally.
    const xPos = (pageWidth - imgW) / 2;
    
    // Determine image type
    let imageType = "JPEG";
    if (imageSrc.startsWith("data:image/png") || 
        (exp.receiptFileName && exp.receiptFileName.toLowerCase().endsWith('.png'))) {
      imageType = "PNG";
    }
    
    doc.addImage(
      imageSrc,
      imageType,
      xPos,
      currentY,
      imgW,
      imgH
    );


    // Draw a black border around the image using rect()
    doc.setDrawColor(0); // Black border color
    doc.setLineWidth(0.5); // Border thickness
    doc.rect(xPos, currentY, imgW, imgH); // Draw rectangle around the image

    // Update Y position for next image
    currentY += imgH + imageSpacing;
  }
}


  // --- Add Footer with Page Numbers on Every Page ---
  const pageCount = doc.internal.getNumberOfPages();
  doc.setFontSize(10);
  for (let i = 1; i <= pageCount; i++) {
    doc.setPage(i);
    doc.text(`Pagina ${i} di ${pageCount}`, pageWidth / 2, pageHeight - 10, { align: "center" });
    // Additionally, add the small header on every page
    doc.text("Nota Spese – " + todayString, pageWidth / 2, 5, { align: "center" });
  }
  
  doc.filename = document.getElementById("reportPeriod").value+".pdf";
  doc.save(doc.filename);
});

// Helper function to convert data URL to Blob
function dataURLtoBlob(dataURL) {
  const parts = dataURL.split(';base64,');
  const contentType = parts[0].split(':')[1];
  const raw = window.atob(parts[1]);
  const rawLength = raw.length;
  const uInt8Array = new Uint8Array(rawLength);
  
  for (let i = 0; i < rawLength; ++i) {
    uInt8Array[i] = raw.charCodeAt(i);
  }
  
  return new Blob([uInt8Array], { type: contentType });
}

// Sort expenses by date (oldest to newest)
function sortExpensesByDate() {
  expenses.sort((a, b) => {
    const dateA = new Date(a.date);
    const dateB = new Date(b.date);
    return dateA - dateB; // Ascending order (oldest first)
  });
  
  // Update UI after sorting
  saveExpenses();
  alert("Expenses sorted by date (oldest first)");
}

// Helper function to convert base64 string to Blob
function base64ToBlob(base64, contentType) {
  contentType = contentType || '';
  const byteCharacters = atob(base64.split(',')[1]);
  const byteArrays = [];
  
  for (let offset = 0; offset < byteCharacters.length; offset += 512) {
    const slice = byteCharacters.slice(offset, offset + 512);
    const byteNumbers = new Array(slice.length);
    
    for (let i = 0; i < slice.length; i++) {
      byteNumbers[i] = slice.charCodeAt(i);
    }
    
    const byteArray = new Uint8Array(byteNumbers);
    byteArrays.push(byteArray);
  }
  
  return new Blob(byteArrays, {type: contentType});
}
